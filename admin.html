<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>TabFlow 激活码管理</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 500px; margin: 60px auto; padding: 20px; }
    h1 { font-size: 24px; }
    .card { background: #fff; border-radius: 12px; padding: 24px; margin: 16px 0; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .input { width: 100%; padding: 10px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
    .btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .btn-primary { background: #667eea; color: #fff; }
    .btn-primary:hover { background: #5a6fd6; }
    .btn-copy { background: #27ae60; color: #fff; }
    .result { margin-top: 16px; padding: 16px; background: #f0fdf4; border-radius: 8px; display: none; }
    .result .key { font-family: monospace; font-size: 20px; font-weight: 700; color: #667eea; letter-spacing: 1px; }
    .result .email { color: #666; font-size: 13px; }
    .history { margin-top: 24px; }
    .history-item { padding: 10px 0; border-bottom: 1px solid #eee; font-size: 13px; display: flex; justify-content: space-between; }
    .history-item .hkey { font-family: monospace; color: #667eea; }
    .history-item .hemail { color: #999; }
    .count { font-size: 13px; color: #999; }
  </style>
</head>
<body>
  <h1>🔑 TabFlow 激活码生成器</h1>
  
  <div class="card">
    <label>买家邮箱地址：</label>
    <input id="emailInput" class="input" type="email" placeholder="user@example.com" />
    <button id="genBtn" class="btn btn-primary">生成激活码</button>
    
    <div id="result" class="result">
      <div class="email" id="resultEmail"></div>
      <div class="key" id="resultKey"></div>
      <button id="copyBtn" class="btn btn-copy" style="margin-top:8px">📋 复制激活信息</button>
    </div>
  </div>

  <div class="card">
    <h3>📋 生成记录 <span id="historyCount" class="count"></span></h3>
    <div id="history"></div>
    <button id="clearHistory" style="background:none;border:none;color:#e74c3c;cursor:pointer;font-size:12px;margin-top:8px">清除记录</button>
  </div>

  <div class="card" style="font-size:13px;color:#888">
    <h3>📧 发给买家的邮件模板</h3>
    <p style="white-space:pre-wrap;background:#f8f9fc;padding:12px;border-radius:8px;" id="template">
主题：TabFlow Pro 激活码

感谢购买 TabFlow Pro！

你的激活码：<span style="color:#667eea;font-weight:bold">[激活码]</span>

激活步骤：
1. 安装 TabFlow 插件
2. 点击插件图标 → 设置（或右键图标 → 选项）
3. 在"激活 Pro"处输入你的邮箱：<span style="color:#667eea">[邮箱]</span>
4. 点击激活即可

如有问题，回复此邮件即可。
    </p>
  </div>

  <script>
    const el = (id) => document.getElementById(id);
    
    async function genKey(email) {
      const enc = new TextEncoder().encode(email + "_tabflow_salt_2024");
      const hash = await crypto.subtle.digest("SHA-256", enc);
      return Array.from(new Uint8Array(hash))
        .map(b => b.toString(16).padStart(2, "0")).join("").slice(0, 16);
    }

    function loadHistory() {
      const raw = localStorage.getItem("tabflow_keys") || "[]";
      return JSON.parse(raw);
    }

    function saveHistory(h) {
      localStorage.setItem("tabflow_keys", JSON.stringify(h));
    }

    function renderHistory() {
      const h = loadHistory();
      el("historyCount").textContent = `(${h.length} 条)`;
      const div = el("history");
      div.innerHTML = h.reverse().map(item => 
        `<div class="history-item"><span class="hemail">${esc(item.email)}</span><span class="hkey">${item.key}</span><span style="color:#999;font-size:11px">${new Date(item.time).toLocaleString("zh-CN")}</span></div>`
      ).join("");
    }

    function esc(s) { return s.replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    el("genBtn").addEventListener("click", async () => {
      const email = el("emailInput").value.trim();
      if (!email || !email.includes("@")) return alert("请输入有效邮箱");
      const key = await genKey(email);
      el("resultEmail").textContent = "邮箱：" + email;
      el("resultKey").textContent = key;
      el("result").style.display = "block";
      
      const h = loadHistory();
      h.push({ email, key, time: Date.now() });
      saveHistory(h);
      renderHistory();
    });

    el("copyBtn").addEventListener("click", () => {
      const email = el("emailInput").value.trim();
      const key = el("resultKey").textContent;
      navigator.clipboard.writeText(`激活码：${key}\n邮箱：${email}`);
      el("copyBtn").textContent = "✅ 已复制！";
      setTimeout(() => el("copyBtn").textContent = "📋 复制激活信息", 2000);
    });

    el("clearHistory").addEventListener("click", () => {
      if (confirm("清除所有生成记录？")) { localStorage.removeItem("tabflow_keys"); renderHistory(); }
    });

    renderHistory();
  </script>
</body>
</html>
